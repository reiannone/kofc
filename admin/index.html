<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KofC Advisor — Knowledge Base Admin</title>
<style>
  :root { --navy:#1b2a4a; --blue:#2f5597; --bg:#f5f6f8; --card:#fff; --border:#dfe3ea; --sub:#666; --no:#b02a37; --ok:#1e7e34; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: system-ui, sans-serif; background: var(--bg); color:#222; }
  header { background: var(--navy); color:#fff; padding: 14px 24px; display:flex; align-items:center; gap:10px; }
  header h1 { font-size:16px; margin:0; font-weight:600; }
  .wrap { max-width: 820px; margin: 24px auto; padding: 0 16px; }
  .card { background: var(--card); border:1px solid var(--border); border-radius:10px; padding:20px; margin-bottom:20px; }
  h2 { font-size:14px; color: var(--navy); margin:0 0 14px; }
  label { font-size:12px; color: var(--sub); display:block; margin-bottom:6px; }
  select { width:100%; padding:9px 10px; border:1px solid var(--border); border-radius:6px; font-size:14px; background:#fff; margin-bottom:14px; }
  .drop { border:2px dashed var(--border); border-radius:10px; padding:30px; text-align:center; color: var(--sub); cursor:pointer; transition:.15s; }
  .drop.hover { border-color: var(--blue); background:#f0f4fb; color: var(--navy); }
  .drop strong { color: var(--blue); }
  .file { margin-top:12px; font-size:13px; color:#222; }
  button { background: var(--blue); color:#fff; border:none; border-radius:6px; padding:10px 16px; font-size:14px; cursor:pointer; }
  button:disabled { background: var(--border); cursor:default; }
  .status { margin-top:12px; font-size:13px; }
  .status.err { color: var(--no); }
  .status.ok { color: var(--ok); }
  table { width:100%; border-collapse: collapse; font-size:13px; }
  th, td { text-align:left; padding:8px 10px; border-bottom:1px solid var(--border); }
  th { color: var(--sub); font-weight:600; font-size:11px; text-transform:uppercase; }
  .tag { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; background:#eef2f9; color: var(--navy); }
  .del { background:transparent; color: var(--no); padding:4px 8px; font-size:12px; }
  .muted { color: var(--sub); font-size:12px; }
</style>
</head>
<body>
<header><h1>KofC Advisor — Knowledge Base Admin</h1></header>
<div class="wrap">

  <div class="card">
    <h2>Add a document</h2>
    <label>Category</label>
    <select id="collection"></select>
    <div id="drop" class="drop">
      Drag a file here, or <strong>click to choose</strong><br />
      <span class="muted">.txt, .docx, or .pdf</span>
    </div>
    <input id="file" type="file" accept=".txt,.docx,.pdf" style="display:none" />
    <div id="fname" class="file"></div>
    <div style="margin-top:14px">
      <button id="upload" disabled>Upload &amp; ingest</button>
    </div>
    <div id="status" class="status"></div>
  </div>

  <div class="card">
    <h2>Ingested documents</h2>
    <table>
      <thead><tr><th>Document</th><th>Category</th><th>Chunks</th><th></th></tr></thead>
      <tbody id="docs"><tr><td colspan="4" class="muted">Loading…</td></tr></tbody>
    </table>
  </div>

</div>
<script>
const API = '../api';
let chosenFile = null;

const $ = (id) => document.getElementById(id);
const drop = $('drop'), fileInput = $('file'), uploadBtn = $('upload');

function setStatus(msg, cls='') { const s=$('status'); s.textContent=msg; s.className='status '+cls; }

async function loadList() {
  try {
    const res = await fetch(`${API}/kb-list.php`, { credentials:'same-origin' });
    const data = await res.json();
    // categories
    const sel = $('collection');
    if (!sel.dataset.filled) {
      sel.innerHTML = Object.entries(data.collections)
        .map(([id, c]) => `<option value="${id}">${c.label}</option>`).join('');
      sel.dataset.filled = '1';
    }
    // docs
    const tb = $('docs');
    if (!data.docs || data.docs.length === 0) {
      tb.innerHTML = '<tr><td colspan="4" class="muted">Nothing ingested yet.</td></tr>';
      return;
    }
    const labels = Object.fromEntries(Object.entries(data.collections).map(([id,c]) => [id, c.label]));
    tb.innerHTML = data.docs.map(d => `
      <tr>
        <td>${d.source}</td>
        <td><span class="tag">${labels[d.collection] || d.collection}</span></td>
        <td>${d.chunks}</td>
        <td><button class="del" data-src="${d.source}">Delete</button></td>
      </tr>`).join('');
    tb.querySelectorAll('.del').forEach(b =>
      b.onclick = () => delDoc(b.dataset.src));
  } catch (e) {
    setStatus('Could not load list: ' + e.message, 'err');
  }
}

function pick(f) {
  chosenFile = f;
  $('fname').textContent = f ? `Selected: ${f.name}` : '';
  uploadBtn.disabled = !f;
}

drop.onclick = () => fileInput.click();
fileInput.onchange = () => pick(fileInput.files[0]);
drop.ondragover = (e) => { e.preventDefault(); drop.classList.add('hover'); };
drop.ondragleave = () => drop.classList.remove('hover');
drop.ondrop = (e) => { e.preventDefault(); drop.classList.remove('hover'); if (e.dataTransfer.files[0]) pick(e.dataTransfer.files[0]); };

uploadBtn.onclick = async () => {
  if (!chosenFile) return;
  uploadBtn.disabled = true;
  setStatus('Uploading and embedding… this can take a moment for large files.');
  const fd = new FormData();
  fd.append('file', chosenFile);
  fd.append('collection', $('collection').value);
  try {
    const res = await fetch(`${API}/kb-upload.php`, { method:'POST', body: fd, credentials:'same-origin' });
    const data = await res.json();
    if (!res.ok) { setStatus(data.error || 'upload failed', 'err'); uploadBtn.disabled=false; return; }
    setStatus(`Ingested ${data.source} — ${data.chunks} chunks into ${data.collection}.`, 'ok');
    pick(null); fileInput.value=''; loadList();
  } catch (e) {
    setStatus('Error: ' + e.message, 'err');
  } finally {
    uploadBtn.disabled = !chosenFile;
  }
};

async function delDoc(source) {
  if (!confirm(`Delete "${source}" from the knowledge base?`)) return;
  try {
    const res = await fetch(`${API}/kb-delete.php`, {
      method:'POST', headers:{'Content-Type':'application/json'}, credentials:'same-origin',
      body: JSON.stringify({ source })
    });
    const data = await res.json();
    if (!res.ok) { setStatus(data.error || 'delete failed', 'err'); return; }
    setStatus(`Deleted ${source}.`, 'ok');
    loadList();
  } catch (e) { setStatus('Error: ' + e.message, 'err'); }
}

loadList();
</script>
</body>
</html>
