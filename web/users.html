<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KofC Advisor — User Management</title>
<style>
  :root { --navy:#1b2a4a; --blue:#2f5597; --bg:#f5f6f8; --card:#fff; --border:#dfe3ea; --sub:#666; --no:#b02a37; --ok:#1e7e34; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:system-ui,sans-serif; background:var(--bg); color:#222; }
  header { background:var(--navy); color:#fff; padding:14px 24px; display:flex; align-items:center; gap:12px; }
  header h1 { font-size:16px; margin:0; font-weight:600; }
  header a { color:#cfe; font-size:12px; text-decoration:none; margin-left:auto; }
  .wrap { max-width:820px; margin:24px auto; padding:0 16px; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:20px; margin-bottom:20px; }
  h2 { font-size:14px; color:var(--navy); margin:0 0 14px; }
  label { font-size:12px; color:var(--sub); display:block; margin-bottom:4px; }
  input, select { width:100%; padding:9px 10px; border:1px solid var(--border); border-radius:6px; font-size:14px; margin-bottom:12px; background:#fff; }
  .form-row { display:grid; grid-template-columns:1fr 1fr 110px; gap:10px; align-items:end; }
  button { background:var(--blue); color:#fff; border:none; border-radius:6px; padding:9px 14px; font-size:13px; cursor:pointer; }
  button.sm { padding:5px 10px; font-size:12px; }
  button.danger { background:transparent; color:var(--no); border:1px solid var(--border); }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th, td { text-align:left; padding:9px 10px; border-bottom:1px solid var(--border); }
  th { color:var(--sub); font-weight:600; font-size:11px; text-transform:uppercase; }
  .tag { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; background:#eef2f9; color:var(--navy); }
  .tag.admin { background:#e7eefc; color:var(--blue); }
  .muted { color:var(--sub); font-size:12px; }
  .status { font-size:13px; margin-top:10px; }
  .status.err { color:var(--no); } .status.ok { color:var(--ok); }
  .acts { display:flex; gap:6px; }
</style>
</head>
<body>
<header>
  <h1>KofC Advisor — User Management</h1>
  <a href="index.html">KB Admin</a><a href="supervisor.html">Supervisor</a>
</header>
<div class="wrap">

  <div class="card">
    <h2>Add user</h2>
    <div class="form-row">
      <div><label>Username</label><input id="nu" /></div>
      <div><label>Temporary password</label><input id="np" type="text" placeholder="they'll change it on first login" /></div>
      <div><label>Role</label><select id="nr"><option value="agent">agent</option><option value="admin">admin</option></select></div>
    </div>
    <button id="add">Add user</button>
    <div id="addmsg" class="status"></div>
  </div>

  <div class="card">
    <h2>Users</h2>
    <table>
      <thead><tr><th>Username</th><th>Role</th><th>First login</th><th></th></tr></thead>
      <tbody id="rows"><tr><td colspan="4" class="muted">Loading…</td></tr></tbody>
    </table>
    <div id="rowmsg" class="status"></div>
  </div>

</div>
<script>
const API = '../api';
const $ = (id) => document.getElementById(id);
function esc(s){ return (s||'').replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function msg(el, t, cls=''){ el.textContent=t; el.className='status '+cls; }

async function load() {
  try {
    const data = await (await fetch(`${API}/user-list.php`, { credentials:'same-origin' })).json();
    if (data.error) { $('rows').innerHTML = `<tr><td colspan="4" class="muted">${data.error}</td></tr>`; return; }
    $('rows').innerHTML = data.users.map(u => `
      <tr data-u="${esc(u.username)}">
        <td>${esc(u.username)}</td>
        <td><span class="tag ${u.role==='admin'?'admin':''}">${u.role}</span></td>
        <td class="muted">${u.must_change_password==1 ? 'pending password change' : '—'}</td>
        <td><div class="acts">
          <button class="sm reset">Reset PW</button>
          <button class="sm role">${u.role==='admin'?'Make agent':'Make admin'}</button>
          <button class="sm danger del">Delete</button>
        </div></td>
      </tr>`).join('');
    bind();
  } catch (e) { $('rows').innerHTML = `<tr><td colspan="4" class="muted">Error: ${e.message}</td></tr>`; }
}

function bind() {
  document.querySelectorAll('#rows tr').forEach(tr => {
    const u = tr.dataset.u;
    tr.querySelector('.reset').onclick = async () => {
      const pw = prompt(`New temporary password for ${u}:`);
      if (!pw) return;
      await save({ username:u, role: tr.querySelector('.tag').textContent.trim(), password: pw }, `Password reset for ${u}.`);
    };
    tr.querySelector('.role').onclick = async () => {
      const cur = tr.querySelector('.tag').textContent.trim();
      await save({ username:u, role: cur==='admin'?'agent':'admin' }, `Role updated for ${u}.`);
    };
    tr.querySelector('.del').onclick = async () => {
      if (!confirm(`Delete user ${u}?`)) return;
      const res = await fetch(`${API}/user-delete.php`, { method:'POST', headers:{'Content-Type':'application/json'}, credentials:'same-origin', body: JSON.stringify({ username:u }) });
      const d = await res.json();
      if (!res.ok) { msg($('rowmsg'), d.error||'failed', 'err'); return; }
      msg($('rowmsg'), `Deleted ${u}.`, 'ok'); load();
    };
  });
}

async function save(payload, okText) {
  const res = await fetch(`${API}/user-save.php`, { method:'POST', headers:{'Content-Type':'application/json'}, credentials:'same-origin', body: JSON.stringify(payload) });
  const d = await res.json();
  if (!res.ok) { msg($('rowmsg'), d.error||'failed', 'err'); return; }
  msg($('rowmsg'), okText, 'ok'); load();
}

$('add').onclick = async () => {
  const username = $('nu').value.trim(), password = $('np').value, role = $('nr').value;
  if (!username || !password) { msg($('addmsg'), 'username and password required', 'err'); return; }
  const res = await fetch(`${API}/user-save.php`, { method:'POST', headers:{'Content-Type':'application/json'}, credentials:'same-origin', body: JSON.stringify({ username, password, role }) });
  const d = await res.json();
  if (!res.ok) { msg($('addmsg'), d.error||'failed', 'err'); return; }
  msg($('addmsg'), `Added ${username}.`, 'ok'); $('nu').value=''; $('np').value=''; load();
};

load();
</script>
</body>
</html>
